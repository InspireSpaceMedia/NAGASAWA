<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永沢製作所</title>
    <style>
        /* 全体のスタイル */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #0a1128; /* 深いネイビー */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* 背景動画エリア（メインビジュアル） */
        .hero-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* YouTube動画を画面いっぱいに広げて背景にするスタイル */
        .video-bg-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* 動画上のクリックを無効化 */
        }

        .video-bg-wrapper iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw; /* 16:9 の比率 */
            min-height: 100vh;
            min-width: 177.77vh; /* 16:9 の比率 */
            transform: translate(-50%, -50%);
        }

        /* 動画の上に重ねる黒い透過マスク（文字を読みやすくするため） */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(10, 17, 40, 0.4), rgba(10, 17, 40, 0.6));
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            padding: 0 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.7);
        }

        .gold-text {
            color: #d4af37; /* 上品なゴールド */
        }

        p.lead {
            font-size: 1.2rem;
            color: #e0e0e0;
            margin-bottom: 30px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }

        /* コンテンツセクション */
        .section {
            padding: 80px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        h2 {
            font-size: 2rem;
            border-left: 4px solid #d4af37;
            padding-left: 15px;
            margin-bottom: 40px;
            color: #d4af37;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: #111a36;
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 30px;
            border-radius: 4px;
            transition: transform 0.3s, border-color 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #d4af37;
        }

        .card h3 {
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 15px;
        }

        /* フッター */
        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
            color: #888888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- メインビジュアル（背景動画エリア） -->
    <div class="hero-container">
        <div class="video-bg-wrapper">
            <!-- 指定した動画を自動再生・ミュート・ループ・コントロール非表示で埋め込み -->
            <iframe src="https://www.youtube.com/embed/HsDkBJ6cw24?autoplay=1&mute=1&loop=1&playlist=HsDkBJ6cw24&controls=0&disablekb=1&rel=0&modestbranding=1&playsinline=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="video-overlay"></div>
        
        <div class="hero-content">
            <h1>確かな技術、未来を紡ぐ<br><span class="gold-text">永沢製作所</span></h1>
            <p class="lead">群馬から世界へ届ける、精密なものづくりのテクノロジー</p>
        </div>
    </div>

    <!-- 会社概要セクション -->
    <section class="section">
        <h2>私たちの強み</h2>
        <div class="grid">
            <div class="card">
                <h3>精密製造テクノロジー</h3>
                <p>長年培った確かな技術と最新鋭の設備により、寸分の狂いもない高精度な部品製造を実現します。</p>
            </div>
            <div class="card">
                <h3>一貫した生産体制</h3>
                <p>設計から加工, 組み立て, 検査にいたるまで、社内で一貫して行うことで、迅速かつ柔軟に対応いたします。</p>
            </div>
            <div class="card">
                <h3>徹底した品質管理</h3>
                <p>お客様に安心と信頼をお届けするため、厳格な検査基準を設け、最高品質の製品だけを出荷しています。</p>
            </div>
        </div>
    </section>

    <!-- フッター -->
    <footer>
        <p>&copy; 2026 NAGASAWA SEISAKUSHO All Rights Reserved.</p>
    </footer>

</body>
</html>
